apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  # these are replica set labels
  labels:
    purpose: headless-svc-demo
    project: roboshop
spec:
  replicas: 4
  selector:
    # these labels are used to select pods
    matchLabels:
      purpose: headless-svc-demo
      project: roboshop
  # pod definition
  template:
    metadata:
      labels:
        # purpose: dp-demo
       purpose: headless-svc-demo
       project: roboshop
    spec:
      containers:
      - name: nginx
        image: nginx:latest
# apiVersion: v1
# kind: Service
# metadata:
#   name: nginx
# spec:
#   selector:
#     purpose: headless-svc-demo
#     project: roboshop
#   ports:
#     - protocol: TCP
#       port: 80 # service port
#       targetPort: 80 # container port     
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
spec:
  # if services cluster ip is none then we can call it as headless services.
  spec:
  clusterIP: None
  selector:
    purpose: nginx-headless
    project: roboshop
  ports:
    - protocol: TCP
      port: 80 # service port
      targetPort: 80 # container port        