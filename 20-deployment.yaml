apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    purpose: Deployment-demo
    project: roboshop
spec:
  replicas: 4
  selector:
   matchLabels:
     purpose: headless-svc-demo
     project: roboshop
   template:
    metadata:
      labels:
        # purpose: dp-demo
        purpose: headless-svc-demo
        project: roboshop
    spec:
      containers:
      - name: nginx
        image: nginx:latest    